name: Build and Release EXE

on:
  push:
    branches:
      - main     # Triggers automatically when you push to tim_dev
    tags:
      - 'v*'        # Triggers automatically when you push a version tag
  workflow_dispatch: # Allows you to trigger it manually via the UI button

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      PYTHONUTF8: 1

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run build script
      run: |
        python build.py

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.exe
        # If triggered by a tag, use the tag name. If triggered by a branch, use a dev label.
        name: ${{ github.ref_type == 'tag' && github.ref_name || 'Development Build' }}
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest-dev' }}
        draft: false
        prerelease: ${{ github.ref_type != 'tag' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}