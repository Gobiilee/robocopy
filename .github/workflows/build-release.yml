name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # Triggers the workflow whenever you push a version tag like v1.0.0

permissions:
  contents: write # Required to create a release and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Match your development Python version
        cache: 'pip'          # Caches pip dependencies to speed up future runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # If pyinstaller isn't in requirements.txt, uncomment the next line:
        # pip install pyinstaller

    - name: Run build script
      run: |
        python build.py

    - name: Verify build output
      shell: bash
      run: |
        # Optional check to ensure the file exists before releasing
        ls -la dist/

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.exe
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}